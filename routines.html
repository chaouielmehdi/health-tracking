<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Routines · Mehdi</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  :root{
    --bg:#1A1D1F;
    --panel:#21252A;
    --panel-border:#2E3338;
    --text:#F2F0EC;
    --text-dim:#9A9FA3;
    --text-dim2:#8B9096;
    --accent:#8B9474;
    --accent-soft:rgba(139,148,116,0.16);
    --warn:#D9A05B;
    --bad:#C2604F;
    --good:#7FAE8E;
    --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
    --sans:-apple-system,'Inter',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:680px;margin:0 auto;padding:72px 28px 80px;}

  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-dim2);text-decoration:none;font-family:var(--mono);margin-bottom:36px;transition:color 0.15s;}
  .back-link:hover{color:var(--text);}

  .badge{display:inline-flex;align-items:center;gap:8px;background:var(--accent-soft);border:1px solid rgba(139,148,116,0.3);color:var(--accent);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;padding:5px 13px;border-radius:100px;margin-bottom:8px;}
  .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
  h1{font-size:32px;font-weight:700;line-height:1.15;letter-spacing:-0.025em;margin-bottom:10px;}
  h1 em{font-style:normal;color:var(--accent);}
  .hero-sub{font-size:14px;color:var(--text-dim);line-height:1.7;margin-bottom:48px;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim2);font-size:13px;line-height:2;border:1px dashed var(--panel-border);border-radius:14px;}

  .day-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
  .day-card:last-child{margin-bottom:0;}

  .day-header{padding:14px 18px;border-bottom:1px solid var(--panel-border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .day-date{font-size:14px;font-weight:700;}
  .day-type{font-size:10.5px;font-family:var(--mono);color:var(--text-dim2);background:rgba(255,255,255,0.05);border:1px solid var(--panel-border);border-radius:100px;padding:2px 10px;white-space:nowrap;}
  .day-type.training{color:var(--good);border-color:rgba(127,174,142,0.25);}

  .day-body{padding:16px 18px;border-bottom:1px solid var(--panel-border);}
  .routine-pre{font-family:var(--mono);font-size:11.5px;color:var(--text-dim);line-height:1.9;white-space:pre-wrap;word-break:break-word;}

  .day-footer{padding:12px 18px;display:flex;align-items:center;justify-content:flex-end;}
  .report-link{font-size:11.5px;font-family:var(--mono);color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:color 0.15s;}
  .report-link:hover{color:var(--text);}

  @media(max-width:560px){
    .wrap{padding:48px 18px 56px;}
    h1{font-size:24px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back-link">← Health &amp; Body</a>

  <div class="badge"><span class="badge-dot"></span>Daily Log</div>
  <h1>Daily <em>Routines</em></h1>
  <p class="hero-sub">Every tracked day — routine log and nutrition report.</p>

  <div id="days-list"></div>
</div>
<script>
  fetch('data/routines-index.json?v='+Date.now())
    .then(r=>r.json())
    .then(days=>{
      const list=document.getElementById('days-list');
      if(!days.length){
        list.innerHTML='<div class="empty-state">No days tracked yet.<br>Use the health-tracking skill to log your first day.</div>';
        return;
      }
      list.innerHTML=days.map(d=>`
        <div class="day-card">
          <div class="day-header">
            <span class="day-date">📅 ${d.date}</span>
            <span class="day-type${d.dayType==='training'?' training':''}">${d.dayType==='training'?'Training day':'Rest day'}</span>
          </div>
          <div class="day-body">
            <div class="routine-pre" id="rt-${d.date}">Loading…</div>
          </div>
          <div class="day-footer">
            <a href="assets/tracking-${d.date}.html" class="report-link" target="_blank">View Nutrition Report &rarr;</a>
          </div>
        </div>`).join('');

      days.forEach(d=>{
        fetch(`data/routine-${d.date}.json?v=`+Date.now())
          .then(r=>r.json())
          .then(r=>{
            const el=document.getElementById('rt-'+d.date);
            if(el) el.textContent=r.routineText||'';
          })
          .catch(()=>{
            const el=document.getElementById('rt-'+d.date);
            if(el) el.textContent='Routine not available.';
          });
      });
    })
    .catch(()=>{
      document.getElementById('days-list').innerHTML='<div class="empty-state">No days tracked yet.</div>';
    });
</script>
</body>
</html>
