name: Update deploy timestamp

on:
  deployment_status:

jobs:
  update-timestamp:
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'github-pages' &&
      github.event.deployment.creator.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Write deploy timestamp
        run: |
          mkdir -p data
          printf '{"deployedAt":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > data/deploy.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/deploy.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update deploy timestamp [skip ci]"
          git pull --rebase origin main
          git push origin main
