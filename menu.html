<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standard Menu · Mehdi</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="header.js"></script>
<style>
  :root{
    --bg:#1A1D1F;
    --panel:#21252A;
    --panel-border:#2E3338;
    --text:#F2F0EC;
    --text-dim:#9A9FA3;
    --text-dim2:#8B9096;
    --accent:#8B9474;
    --accent-soft:rgba(139,148,116,0.16);
    --warn:#D9A05B;
    --warn-soft:rgba(217,160,91,0.14);
    --bad:#C2604F;
    --bad-soft:rgba(194,96,79,0.14);
    --good:#7FAE8E;
    --good-soft:rgba(127,174,142,0.14);
    --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
    --sans:-apple-system,'Inter',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);padding:28px;-webkit-font-smoothing:antialiased;}
  #page-header{max-width:680px;margin:0 auto 28px;}
  #page-header h1{font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.2;color:var(--text);}
  #page-header h1 em{font-style:normal;color:var(--accent);}
  .app{max-width:680px;margin:0 auto;}

  /* DAY TYPE TOGGLE */
  .daytype{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
  .daytype-btn{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
  .daytype-btn.active{border-color:var(--accent);background:var(--accent-soft);}
  .daytype-name{font-size:13.5px;font-weight:700;margin-bottom:2px;}
  .daytype-kcal{font-family:var(--mono);font-size:11.5px;color:var(--text-dim2);}
  .daytype-btn.active .daytype-kcal{color:var(--accent);}

  /* MACRO GAUGES (reused from tracking template) */
  .macros{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:24px;}
  .macro-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:14px 12px;}
  .macro-name{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim2);font-weight:700;margin-bottom:8px;}
  .macro-value{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1;margin-bottom:2px;}
  .macro-target{font-family:var(--mono);font-size:10.5px;color:var(--text-dim2);margin-bottom:10px;}
  .gauge-track{height:6px;background:#171A1C;border-radius:6px;overflow:hidden;position:relative;}
  .gauge-fill{height:100%;border-radius:6px;transition:width 0.3s ease;}
  .gauge-fill.good{background:var(--good);}
  .gauge-fill.warn{background:var(--warn);}
  .gauge-fill.bad{background:var(--bad);}
  .macro-pct{font-family:var(--mono);font-size:11px;font-weight:700;margin-top:6px;text-align:right;}
  .macro-pct.good{color:var(--good);}
  .macro-pct.warn{color:var(--warn);}
  .macro-pct.bad{color:var(--bad);}

  .section-title{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim2);font-weight:700;margin:24px 0 10px;}

  /* MEAL CARD */
  .meal-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
  .meal-header{padding:14px 18px;border-bottom:1px solid var(--panel-border);display:flex;align-items:center;justify-content:space-between;}
  .meal-name{font-size:14.5px;font-weight:700;}
  .meal-kcal{font-family:var(--mono);font-size:12px;color:var(--text-dim2);}
  .meal-body{padding:6px 18px 14px;}

  .item-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
  .item-row:last-child{border-bottom:none;}
  .item-label{font-size:12.5px;color:var(--text-dim);line-height:1.4;}
  .item-macro{font-family:var(--mono);font-size:11px;color:var(--text-dim2);white-space:nowrap;flex-shrink:0;}
  .item-qty{font-family:var(--mono);color:var(--text-dim2);font-size:11.5px;}

  /* CHOICE PICKER */
  .choice-block{margin:10px 0 4px;}
  .choice-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px;}
  .choice-options{display:flex;flex-direction:column;gap:6px;}
  .choice-opt{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.02);border:1px solid var(--panel-border);border-radius:10px;padding:9px 12px;cursor:pointer;transition:border-color .15s,background .15s;}
  .choice-opt:hover{border-color:rgba(139,148,116,0.4);}
  .choice-opt.selected{border-color:var(--accent);background:var(--accent-soft);}
  .choice-opt input{accent-color:var(--accent);flex-shrink:0;}
  .choice-opt-label{font-size:12.5px;color:var(--text);flex:1;}
  .choice-opt-macro{font-family:var(--mono);font-size:10.5px;color:var(--text-dim2);white-space:nowrap;}

  .training-tag{display:inline-block;font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;color:var(--warn);background:var(--warn-soft);border-radius:100px;padding:2px 8px;margin-left:8px;}

  .footer-note{margin-top:22px;font-size:11px;color:var(--text-dim2);text-align:center;}

  /* IMPACT TOASTS */
  .impact-toast{
    position:fixed; left:50%; transform:translateX(-50%);
    max-width:560px; width:calc(100% - 36px);
    background:var(--panel); border:1px solid var(--panel-border); border-radius:14px;
    padding:12px 16px; box-shadow:0 8px 28px rgba(0,0,0,0.35);
    z-index:50; opacity:0; transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;
  }
  .impact-toast.top{top:14px; transform:translateX(-50%) translateY(-8px);}
  .impact-toast.bottom{bottom:14px; transform:translateX(-50%) translateY(8px);}
  .impact-toast.show{opacity:1;}
  .impact-toast.show.top{transform:translateX(-50%) translateY(0);}
  .impact-toast.show.bottom{transform:translateX(-50%) translateY(0);}
  .impact-title{font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim2);font-weight:700;margin-bottom:8px;}
  .impact-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:3px 0;font-size:12.5px;}
  .impact-name{color:var(--text-dim);}
  .impact-delta{font-family:var(--mono);font-weight:700;white-space:nowrap;}
  .impact-delta.good{color:var(--good);}
  .impact-delta.bad{color:var(--bad);}

  /* FULL NUTRIENT TABLE (matching tracking report UI) */
  .full-table-wrap{margin-top:24px;border:1px solid var(--panel-border);border-radius:14px;overflow:hidden;}
  table.full-table{width:100%;border-collapse:collapse;table-layout:fixed;}
  table.full-table th{background:var(--panel);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim2);font-weight:700;text-align:left;padding:10px 10px;border-bottom:1px solid var(--panel-border);}
  table.full-table th:first-child{width:5%;text-align:center;}
  table.full-table th:nth-child(2){width:18%;}
  table.full-table th:nth-child(3){width:32%;}
  table.full-table th:nth-child(4){width:45%;}
  table.full-table td{font-size:11.5px;line-height:1.4;padding:9px 10px;border-bottom:1px solid var(--panel-border);vertical-align:top;color:var(--text);}
  table.full-table tr:last-child td{border-bottom:none;}
  table.full-table tr:nth-child(even){background:rgba(255,255,255,0.015);}
  .ft-num{text-align:center;color:var(--text-dim2);font-family:var(--mono);font-size:11px;}
  .ft-nutrient{font-weight:600;}
  .ft-impact{color:var(--text-dim2);font-size:11px;}
  .ft-coverage{font-family:var(--mono);font-weight:700;font-size:11px;white-space:nowrap;}
  .ft-coverage.good{color:var(--good);}
  .ft-coverage.warn{color:var(--warn);}
  .ft-coverage.bad{color:var(--bad);}

  @media (max-width:600px){
    table.full-table{table-layout:auto;}
    table.full-table th, table.full-table td{padding:8px 7px;font-size:10.5px;}
  }

  @media(max-width:560px){
    .macros{grid-template-columns:1fr 1fr;}
    .macro-value{font-size:16px;}
  }
</style>
</head>
<body>
  <div id="page-header"
    data-badge="The Menu"
    data-back-href="index.html"
    data-back-label="Health Tracking"
    data-title="Standard Menu"
    data-deploy-path="data/deploy.json">
  </div>
  <div class="app" id="app">
    <div class="skel loading" style="height:400px"></div>
  </div>
  <div id="toast-top" class="impact-toast top"></div>
  <div id="toast-bottom" class="impact-toast bottom"></div>

<script>
let MENU = null, FOODS = null;
let state = { day: 'rest', protein: 0, fruit: 0, fat: 0, dairy: 0, dinnerFruit: 0, water: 2, eggPrep: 1 };
// each choice group's display order is fixed once at load (default option
// first) and never changes again, no matter what the user picks afterward
let DISPLAY_ORDER = {};

// food-reference.json stores most foods per 100g, but a few (whey scoops,
// whole eggs) are stored per-serving instead — scale against the right basis.
const SERVING_BASIS_G = {
  'whey-iso100-30g': 30, 'whey-iso100-100g': 100, 'egg': 58, 'egg-beldi': 43,
  'water-sidi-ali': 1000, 'water-ciel': 1000, 'water-ghayt': 1000, 'water-aquafina': 1000
};
const WATER_FOODS = ['water-sidi-ali', 'water-ciel', 'water-ghayt', 'water-aquafina'];
function foodMacros(id){
  const f = FOODS[id];
  if(!f) return {kcal:0,protein:0,carbs:0,fat:0};
  return f;
}
function scale(id, grams){
  const f = foodMacros(id);
  const basis = SERVING_BASIS_G[id] || 100;
  const r = grams/basis;
  return { kcal: f.kcal*r, protein: f.protein*r, carbs: f.carbs*r, fat: f.fat*r };
}
function add(a,b){ return {kcal:a.kcal+b.kcal, protein:a.protein+b.protein, carbs:a.carbs+b.carbs, fat:a.fat+b.fat}; }
function zero(){ return {kcal:0,protein:0,carbs:0,fat:0}; }
function qtyFor(qty){ return (typeof qty === 'object') ? qty[state.day] : qty; }

function itemMacro(item){ return scale(item.food, qtyFor(item.qty)); }
function itemsMacro(items){ return items.reduce((acc,it)=>add(acc,itemMacro(it)), zero()); }
function itemFiber(item){
  const f = FOODS[item.food];
  if(!f) return 0;
  const basis = SERVING_BASIS_G[item.food] || 100;
  return (f.fiber||0) * qtyFor(item.qty)/basis;
}

// ---- 32-nutrient table ----
const NUTRIENT_DEFS = [
  {n:1,  name:'Protein',       unit:'g',  target:165,  impact:'Muscle loss, weakness', special:'protein'},
  {n:2,  name:'Water',         unit:'L',  target:3,    impact:'Dehydration, fatigue', special:'water'},
  {n:3,  name:'Fiber',         unit:'g',  target:30,   impact:'Constipation, gut issues', special:'fiber'},
  {n:4,  name:'Omega-3',       unit:'g',  target:1.6,  impact:'Inflammation, poor recovery'},
  {n:5,  name:'Vitamin D',     unit:'µg', target:15,   impact:'Bone weakness, low mood'},
  {n:6,  name:'Iron',          unit:'mg', target:11,   impact:'Fatigue, anemia'},
  {n:7,  name:'Vitamin B12',   unit:'µg', target:2.4,  impact:'Nerve damage, fatigue'},
  {n:8,  name:'Magnesium',     unit:'mg', target:400,  impact:'Cramps, poor sleep'},
  {n:9,  name:'Calcium',       unit:'mg', target:1000, impact:'Bone loss, fractures'},
  {n:10, name:'Zinc',          unit:'mg', target:11,   impact:'Poor immunity, slow healing'},
  {n:11, name:'Potassium',     unit:'mg', target:4700, impact:'Cramps, irregular heartbeat'},
  {n:12, name:'Folate B9',     unit:'µg', target:400,  impact:'Anemia, fatigue'},
  {n:13, name:'Vitamin C',     unit:'mg', target:90,   impact:'Weak immunity, slow healing'},
  {n:14, name:'Vitamin A',     unit:'µg', target:900,  impact:'Poor vision, weak immunity'},
  {n:15, name:'Iodine',        unit:'µg', target:150,  impact:'Thyroid issues, fatigue'},
  {n:16, name:'Vitamin E',     unit:'mg', target:15,   impact:'Nerve issues, weak immunity'},
  {n:17, name:'Vitamin K',     unit:'µg', target:120,  impact:'Poor blood clotting'},
  {n:18, name:'Vitamin B6',    unit:'mg', target:1.7,  impact:'Mood issues, fatigue'},
  {n:19, name:'Selenium',      unit:'µg', target:55,   impact:'Weak immunity, thyroid issues'},
  {n:20, name:'Thiamine B1',   unit:'mg', target:1.2,  impact:'Fatigue, nerve issues'},
  {n:21, name:'Riboflavin B2', unit:'mg', target:1.3,  impact:'Skin issues, fatigue'},
  {n:22, name:'Niacin B3',     unit:'mg', target:16,   impact:'Skin issues, fatigue'},
  {n:23, name:'Copper',        unit:'mg', target:0.9,  impact:'Anemia, weak bones'},
  {n:24, name:'Choline',       unit:'mg', target:550,  impact:'Liver issues, memory issues'},
  {n:25, name:'Probiotics',    special:'probiotics',   impact:'Poor gut health'},
  {n:26, name:'Sodium',        special:'sodium',       impact:'Cramps or bloating'},
  {n:27, name:'Antioxidants',  special:'antioxidants', impact:'Faster aging, inflammation'},
  {n:28, name:'Phosphorus',    unit:'mg', target:700,  impact:'Bone/teeth weakness, fatigue'},
  {n:29, name:'Manganese',     unit:'mg', target:2.3,  impact:'Weak bones, poor metabolism'},
  {n:30, name:'Chromium',      unit:'µg', target:35,   impact:'Poor blood sugar control'},
  {n:31, name:'Vitamin B5',    unit:'mg', target:5,    impact:'Fatigue, irritability', altNames:['Pantothenic Acid (B5)']},
  {n:32, name:'Biotin B7',     unit:'µg', target:30,   impact:'Hair/skin issues, fatigue'},
];
const UNIT_TO_MG = {g:1000, mg:1, 'µg':0.001};

function parseNutrientValue(str){
  const m = String(str).replace('~','').match(/([\d.]+)\s*(g|mg|µg)/);
  if(!m) return null;
  return { num: parseFloat(m[1]), unit: m[2] };
}

// flat list of every {food, qty} item contributing to the day right now
function collectAllItems(){
  const items = [];
  Object.values(MENU.meals).forEach(meal=>{
    if(meal.items) items.push(...meal.items);
    if(meal.choices) meal.choices.forEach(c=>{
      const opt = c.options[state[c.id]];
      const optItems = opt.items || (opt.food ? [{food:opt.food, qty:opt.qty}] : []);
      items.push(...optItems);
    });
    if(meal.trainingOnly && state.day==='training') items.push(...meal.trainingOnly);
  });
  return items;
}

function computeMicronutrients(){
  const items = collectAllItems();
  const totals = {}; // nutrient name (from NUTRIENT_DEFS) -> mg-equivalent sum
  let sodiumMg = 0;
  let fiberG = 0;
  let waterMl = 0;

  items.forEach(it=>{
    const f = FOODS[it.food];
    if(!f) return;
    const basis = SERVING_BASIS_G[it.food] || 100;
    const r = qtyFor(it.qty)/basis;
    fiberG += (f.fiber||0) * r;
    if(WATER_FOODS.indexOf(it.food) !== -1) waterMl += qtyFor(it.qty);
    (f.extra||[]).forEach(e=>{
      const parsed = parseNutrientValue(e.value);
      if(!parsed) return;
      const mgEq = parsed.num * UNIT_TO_MG[parsed.unit] * r;
      if(e.name === 'Sodium') sodiumMg += mgEq;
      const def = NUTRIENT_DEFS.find(d => d.name === e.name || (d.altNames||[]).includes(e.name));
      if(def) totals[def.name] = (totals[def.name]||0) + mgEq;
    });
  });

  return { totals, sodiumMg, fiberG, waterMl };
}

function microStatus(pct){
  if(pct>=90) return 'good';
  if(pct>=50) return 'warn';
  return 'bad';
}
function fmtNutrient(mgEq, unit){
  const val = mgEq / UNIT_TO_MG[unit];
  const decimals = val < 10 ? (val < 1 ? 2 : 1) : 0;
  return (Math.round(val*Math.pow(10,decimals))/Math.pow(10,decimals));
}

function renderFullTable(dayTotal, proteinPct){
  const {totals, sodiumMg, fiberG, waterMl} = computeMicronutrients();
  const dairyOpt = MENU.meals.dinner.choices.find(c=>c.id==='dairy').options[state.dairy];
  const dairyIsRaib = dairyOpt.label.toLowerCase().includes('raib');
  const dairyIsNothing = dairyOpt.label.toLowerCase().includes('nothing');
  const bfFruitEmpty = MENU.meals.breakfast.choices.find(c=>c.id==='fruit').options[state.fruit].label.includes('Nothing');
  const dinFruitEmpty = MENU.meals.dinner.choices.find(c=>c.id==='dinnerFruit').options[state.dinnerFruit].label.includes('Nothing');

  const rows = NUTRIENT_DEFS.map(def=>{
    let coverage, status;
    if(def.special==='protein'){
      status = statusFor(proteinPct, 'protein');
      coverage = `${fmt1(dayTotal.protein)}g / ${def.target}g (${Math.round(proteinPct)}%)`;
    } else if(def.special==='water'){
      const waterL = waterMl/1000;
      const pct = waterL/def.target*100;
      status = microStatus(pct);
      coverage = `${fmt1(waterL)}L / ${def.target}L (${Math.round(pct)}%)`;
    } else if(def.special==='fiber'){
      const pct = fiberG/def.target*100;
      status = microStatus(pct);
      coverage = `~${fmt1(fiberG)}g / ${def.target}g (${Math.round(pct)}%)`;
    } else if(def.special==='sodium'){
      status = sodiumMg < 1500 ? 'good' : sodiumMg < 2300 ? 'warn' : 'bad';
      const label = sodiumMg < 1500 ? 'low' : sodiumMg < 2300 ? 'moderate' : 'high';
      coverage = `~${Math.round(sodiumMg)}mg (${label})`;
    } else if(def.special==='probiotics'){
      if(dairyIsRaib){ status='good'; coverage='Raib — fermented, live cultures'; }
      else if(dairyIsNothing){ status='bad'; coverage='No dairy today'; }
      else { status='warn'; coverage='Perly — fresh, not fermented'; }
    } else if(def.special==='antioxidants'){
      const fruitCount = (bfFruitEmpty?0:1) + (dinFruitEmpty?0:1);
      if(fruitCount===2){ status='good'; coverage='Good variety (2 fruits + veg)'; }
      else if(fruitCount===1){ status='warn'; coverage='Limited — only one fruit today'; }
      else { status='bad'; coverage='No fruit today, veg only'; }
    } else {
      const mgEq = totals[def.name] || 0;
      const targetMgEq = def.target * UNIT_TO_MG[def.unit];
      const pct = mgEq/targetMgEq*100;
      status = microStatus(pct);
      coverage = `~${fmtNutrient(mgEq, def.unit)}${def.unit} / ${def.target}${def.unit} (${Math.round(pct)}%)`;
    }
    return `<tr>
      <td class="ft-num">${def.n}</td>
      <td class="ft-nutrient">${def.name}</td>
      <td class="ft-impact">${def.impact}</td>
      <td class="ft-coverage ${status}">${coverage}</td>
    </tr>`;
  }).join('');

  return `<div class="section-title">Nutrient Coverage Tracker</div>
    <div class="full-table-wrap">
      <table class="full-table">
        <thead><tr><th>#</th><th>Nutrient</th><th>Impact if missing</th><th>Coverage</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function fmt1(n){ return Math.round(n*10)/10; }
function statusFor(pct, kind){
  // directional bands matching the health-tracking skill
  if(kind==='protein'){
    if(pct>=100&&pct<=120) return 'good';
    if((pct>=90&&pct<100)||(pct>120&&pct<=135)) return 'warn';
    return 'bad';
  }
  if(kind==='carbs'){
    if(pct>=85&&pct<=100) return 'good';
    if((pct>=70&&pct<85)||(pct>100&&pct<=115)) return 'warn';
    return 'bad';
  }
  if(kind==='fat'){
    if(pct>=80&&pct<=100) return 'good';
    if((pct>=70&&pct<80)||(pct>100&&pct<=115)) return 'warn';
    return 'bad';
  }
  // kcal: within 100 good, 100-300 warn, else bad — pct here is abs diff already handled by caller
  return pct;
}
function kcalStatus(actual, target){
  const diff = Math.abs(actual-target);
  if(diff<=100) return 'good';
  if(diff<=300) return 'warn';
  return 'bad';
}

function macroCard(name, value, target, pct, status, unit){
  return `<div class="macro-card">
    <div class="macro-name">${name}</div>
    <div class="macro-value">${value}${unit||''}</div>
    <div class="macro-target">/ ${target}${unit||''}</div>
    <div class="gauge-track"><div class="gauge-fill ${status}" style="width:${Math.min(pct,100)}%"></div></div>
    <div class="macro-pct ${status}">${Math.round(pct)}%</div>
  </div>`;
}

const ML_FOODS = ['mint-tea', 'black-coffee', 'water-sidi-ali', 'water-ciel', 'water-ghayt', 'water-aquafina'];
function formatQty(item){
  const grams = qtyFor(item.qty);
  if(item.food && item.food.indexOf('whey-iso100') === 0){
    const scoops = grams/30;
    return (scoops % 1 === 0 ? scoops : scoops.toFixed(1)) + (scoops===1 ? ' scoop' : ' scoops');
  }
  if(item.food && ML_FOODS.indexOf(item.food) !== -1){
    return Math.round(grams) + 'ml';
  }
  return Math.round(grams) + 'g';
}

function renderMealItems(items){
  return items.map(it=>{
    const m = itemMacro(it);
    return `<div class="item-row"><span class="item-label">${it.label} <span class="item-qty">(${formatQty(it)})</span></span><span class="item-macro">${Math.round(m.kcal)} kcal</span></div>`;
  }).join('');
}

function renderChoice(c){
  const selIdx = state[c.id];
  const order = DISPLAY_ORDER[c.id];
  const opts = order.map(i=>{
    const opt = c.options[i];
    const items = opt.items || [{food:opt.food, qty:opt.qty}];
    const m = itemsMacro(items);
    const sel = i===selIdx ? 'selected' : '';
    const qtyStr = items.length ? items.map(formatQty).join(' + ') : '0g';
    return `<label class="choice-opt ${sel}">
      <input type="radio" name="${c.id}" value="${i}" ${i===selIdx?'checked':''} onchange="selectChoice('${c.id}',${i})">
      <span class="choice-opt-label">${opt.label} <span class="item-qty">(${qtyStr})</span></span>
      <span class="choice-opt-macro">${Math.round(m.kcal)} kcal</span>
    </label>`;
  }).join('');
  return `<div class="choice-block">
    <div class="choice-label">${c.label} — pick one</div>
    <div class="choice-options">${opts}</div>
  </div>`;
}
function renderChoices(meal){
  if(!meal.choices) return '';
  return meal.choices.map(renderChoice).join('');
}

function selectChoice(id, idx){
  const before = snapshotState();
  state[id] = idx;
  render();
  announceImpact(before, snapshotState());
}
function selectDay(day){
  const before = snapshotState();
  state.day = day;
  render();
  announceImpact(before, snapshotState());
}

function mealTotal(mealKey, meal){
  let total = zero();
  if(meal.items) total = add(total, itemsMacro(meal.items));
  if(meal.choices){
    meal.choices.forEach(c=>{
      const opt = c.options[state[c.id]];
      const items = opt.items || [{food:opt.food, qty:opt.qty}];
      total = add(total, itemsMacro(items));
    });
  }
  if(meal.trainingOnly && state.day==='training') total = add(total, itemsMacro(meal.trainingOnly));
  return total;
}

function computeDayTotal(){
  return Object.entries(MENU.meals).reduce((acc,[key,meal])=>add(acc, mealTotal(key, meal)), zero());
}

// ---- impact toasts ----
const CEILING_MACROS = {carbs:true, fat:true}; // more = worse; protein is a floor, more = better
function macroDeltaGood(key, delta){
  if(CEILING_MACROS[key]) return delta < 0;
  return delta > 0;
}
function fmtDelta(n, decimals){
  const v = Math.round(n*Math.pow(10,decimals))/Math.pow(10,decimals);
  return (v>0?'+':'') + v;
}
function showToast(el, html){
  el.innerHTML = html;
  el.classList.add('show');
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(()=>{ el.classList.remove('show'); }, 5000);
}

function snapshotState(){
  return { macros: computeDayTotal(), micros: computeMicronutrients() };
}

function announceImpact(before, after){
  const target = MENU.targets[state.day];

  // --- macro toast (top) ---
  const macroDeltas = [
    ['Calories', after.macros.kcal - before.macros.kcal, 0, 'kcal', null],
    ['Protein', after.macros.protein - before.macros.protein, 1, 'g', 'protein'],
    ['Carbs', after.macros.carbs - before.macros.carbs, 1, 'g', 'carbs'],
    ['Fat', after.macros.fat - before.macros.fat, 1, 'g', 'fat'],
  ].filter(([,d]) => Math.abs(d) > 0.05);

  const topEl = document.getElementById('toast-top');
  if(macroDeltas.length){
    const kcalBefore = Math.abs(before.macros.kcal - target.kcal);
    const kcalAfter = Math.abs(after.macros.kcal - target.kcal);
    const rows = macroDeltas.map(([name,d,dec,unit,kind])=>{
      const good = kind ? macroDeltaGood(kind, d) : (kcalAfter <= kcalBefore);
      return `<div class="impact-row"><span class="impact-name">${name}</span><span class="impact-delta ${good?'good':'bad'}">${fmtDelta(d,dec)}${unit}</span></div>`;
    }).join('');
    showToast(topEl, `<div class="impact-title">Macro impact</div>${rows}`);
  }

  // --- micronutrient toast (bottom) ---
  const microDeltas = [];
  NUTRIENT_DEFS.filter(d=>!d.special).forEach(def=>{
    const b = before.micros.totals[def.name] || 0;
    const a = after.micros.totals[def.name] || 0;
    const targetMgEq = def.target * UNIT_TO_MG[def.unit];
    const pctDelta = (a-b)/targetMgEq*100;
    if(Math.abs(pctDelta) > 1){
      microDeltas.push([def.name, pctDelta, (a-b)/UNIT_TO_MG[def.unit], def.unit]);
    }
  });
  // fiber too
  const fiberDeltaPct = (after.micros.fiberG - before.micros.fiberG)/30*100;
  if(Math.abs(fiberDeltaPct) > 1) microDeltas.push(['Fiber', fiberDeltaPct, after.micros.fiberG-before.micros.fiberG, 'g']);

  microDeltas.sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]));
  const top = microDeltas.slice(0,6);

  const bottomEl = document.getElementById('toast-bottom');
  if(top.length){
    const rows = top.map(([name,pctDelta,rawDelta,unit])=>{
      const decimals = Math.abs(rawDelta) < 1 ? 2 : (Math.abs(rawDelta) < 10 ? 1 : 0);
      return `<div class="impact-row"><span class="impact-name">${name}</span><span class="impact-delta ${rawDelta>0?'good':'bad'}">${fmtDelta(rawDelta,decimals)}${unit}</span></div>`;
    }).join('');
    showToast(bottomEl, `<div class="impact-title">Micronutrient impact</div>${rows}`);
  }
}

function render(){
  const target = MENU.targets[state.day];
  let dayTotal = zero();
  const mealBlocks = Object.entries(MENU.meals).map(([key, meal])=>{
    const total = mealTotal(key, meal);
    dayTotal = add(dayTotal, total);
    const fixedHtml = meal.items ? renderMealItems(meal.items) : '';
    const choiceHtml = renderChoices(meal);
    const trainingHtml = (meal.trainingOnly && state.day==='training')
      ? `<div class="choice-label" style="margin-top:10px;">Training addition</div>${renderMealItems(meal.trainingOnly)}`
      : (meal.trainingOnly ? `<div class="item-row"><span class="item-label" style="color:var(--text-dim2);font-style:italic;">+ banana &amp; dates on training days<span class="training-tag">training only</span></span></div>` : '');
    return `<div class="meal-card">
      <div class="meal-header">
        <span class="meal-name">${meal.label}</span>
        <span class="meal-kcal">${Math.round(total.kcal)} kcal</span>
      </div>
      <div class="meal-body">
        ${choiceHtml}
        ${fixedHtml}
        ${trainingHtml}
      </div>
    </div>`;
  }).join('');

  const kStatus = kcalStatus(dayTotal.kcal, target.kcal);
  const pPct = dayTotal.protein/target.protein*100;
  const cPct = dayTotal.carbs/target.carbs*100;
  const fPct = dayTotal.fat/target.fat*100;
  const kPct = dayTotal.kcal/target.kcal*100;

  const macrosHtml = [
    macroCard('Calories', Math.round(dayTotal.kcal), target.kcal.toLocaleString(), kPct, kStatus, ''),
    macroCard('Protein', fmt1(dayTotal.protein), target.protein, pPct, statusFor(pPct,'protein'), 'g'),
    macroCard('Carbs', fmt1(dayTotal.carbs), target.carbs, cPct, statusFor(cPct,'carbs'), 'g'),
    macroCard('Fat', fmt1(dayTotal.fat), target.fat, fPct, statusFor(fPct,'fat'), 'g'),
  ].join('');

  document.getElementById('app').innerHTML = `
    <div class="daytype">
      <div class="daytype-btn ${state.day==='rest'?'active':''}" onclick="selectDay('rest')">
        <div class="daytype-name">Rest day</div>
        <div class="daytype-kcal">${MENU.targets.rest.kcal.toLocaleString()} kcal target</div>
      </div>
      <div class="daytype-btn ${state.day==='training'?'active':''}" onclick="selectDay('training')">
        <div class="daytype-name">Training day</div>
        <div class="daytype-kcal">${MENU.targets.training.kcal.toLocaleString()} kcal target</div>
      </div>
    </div>

    <div class="section-title">Day Total vs Target</div>
    <div class="macros">${macrosHtml}</div>

    <div class="section-title">The Menu</div>
    ${mealBlocks}

    ${renderFullTable(dayTotal, pPct)}

    <div class="footer-note">Pick whichever option you have on hand — each is pre-balanced to hit the same day target. Only micronutrients vary.</div>
  `;
}

(async function(){
  try{
    const [menuResp, foodResp] = await Promise.all([
      fetch('data/menu.json?v='+Date.now()),
      fetch('data/food-reference.json?v='+Date.now())
    ]);
    MENU = await menuResp.json();
    const foodData = await foodResp.json();
    const list = foodData.foods || foodData;
    FOODS = {};
    list.forEach(f=>{ FOODS[f.id] = f; });
  }catch(e){
    document.getElementById('app').innerHTML = '<p style="padding:20px;color:var(--bad)">Failed to load menu data.</p>';
    return;
  }
  // fix each choice group's display order once, default option first —
  // this order never changes again regardless of later selections
  Object.values(MENU.meals).forEach(meal=>{
    (meal.choices||[]).forEach(c=>{
      const selIdx = state[c.id];
      const naturalOrder = c.options.map((_,i)=>i);
      DISPLAY_ORDER[c.id] = [selIdx, ...naturalOrder.filter(i=>i!==selIdx)];
    });
  });
  render();
})();
</script>
